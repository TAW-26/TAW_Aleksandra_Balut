<div class="filters">
  <input type="text"
         placeholder="Szukaj..."
         [(ngModel)]="search"
         (ngModelChange)="applyFilters()" />
  <select [(ngModel)]="category" (ngModelChange)="applyFilters()">
    <option value="">Wszystkie kategorie</option>
    <option value="sport">Sport</option>
    <option value="gry">Gry</option>
    <option value="dzieci">Dzieci</option>
    <option value="spotkania">Spotkania</option>
  </select>
  <input type="date"
         [(ngModel)]="dateFrom"
         (ngModelChange)="applyFilters()"
         placeholder="Od" />
  <input type="date"
         [(ngModel)]="dateTo"
         (ngModelChange)="applyFilters()"
         placeholder="Do" />
</div>
<div class="activity-list">
  <h2>Wydarzenia sąsiedzkie</h2>
  <div class="list">
    <div class="item-wrapper"
         *ngFor="let ev of events()"
         [routerLink]="['/event', ev._id]">
      <app-activity-item [eventInput]="ev"></app-activity-item>
    </div>
  </div>
</div>
